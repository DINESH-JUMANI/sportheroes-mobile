name: sportheroes_mobile
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  pretty_dio_logger: ^1.4.0
  dio: ^5.10.0
  http_parser: ^4.1.2
  flutter_riverpod: ^3.3.2
  shared_preferences: ^2.5.5
  connectivity_plus: ^7.2.0
  device_info_plus: ^13.2.0
  geocoding: ^4.0.0
  geolocator: ^14.0.3
  google_fonts: ^8.1.0
  intl: ^0.20.3
  image_picker: ^1.2.3
  persistent_bottom_nav_bar_v2: 6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logos/sport_heroes.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/logos/sport_heroes.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/logos/
    - assets/images/
